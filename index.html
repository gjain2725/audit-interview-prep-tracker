/* Examples: user override (array) wins; else fall back to the base single example.
   Each example carries a stable id so attachments stay linked across edits/reorders. */
function getExamples(q){
  const st = store.q[q.id] || {};
  let arr;
  if (Array.isArray(st.examples)) arr = st.examples;
  else if (q.ex) arr = [{ label:'💡 Example', text:q.ex }];
  else arr = [];
  return arr.map((ex,idx)=>({ id: ex.id || (q.id+'-ex'+idx), label: ex.label, text: ex.text }));
}
function findBaseQ(id){
  for(const ar of AREAS){ const q=ar.questions.find(x=>x.id===id); if(q) return q; }
  for(const areaId in (store.custom||{})){ const c=(store.custom[areaId]||[]).find(x=>x.id===id); if(c) return c; }
  return null;
}
function isEdited(id){
  const s = store.q[id];
  return !!(s && (s.qOverride!=null || s.aOverride!=null || Array.isArray(s.examples)));
}
/* One editable example row inside the editor */
function exRowHTML(id, label, text){
  return `<div class="ex-row rounded-lg border border-slate-200 dark:border-white/10 p-2.5 mb-2 bg-slate-50/60 dark:bg-black/10" data-exid="${esc(id)}">
    <div class="flex items-center gap-2 mb-1.5">
      <input class="ex-label flex-1 text-xs font-semibold rounded bg-white dark:bg-black/20 border border-slate-200 dark:border-white/10 px-2 py-1.5 outline-none focus:ring-2 focus:ring-brand-400" value="${esc(label)}" placeholder="Example name (e.g. 💡 Example, Real case, My story)">
      <button type="button" data-action="ex-remove" class="text-[11px] font-semibold text-slate-400 hover:text-rose-500 px-2 py-1 shrink-0">✕ Remove</button>
    </div>

  </div>`;
}

/* ============================================================
   DRAG-TO-REORDER (within an area)
   ============================================================ */
let dragId = null;
function currentAreaId(){ const m=(location.hash||'').match(/^#\/a\/([\w-]+)/); return m?m[1]:null; }
function clearDropIndicators(){ document.querySelectorAll('.drop-before,.drop-after').forEach(el=>el.classList.remove('drop-before','drop-after')); }

/* Pressing the grip arms the card for native drag; a plain click disarms it. */
app.addEventListener('mousedown', e => {
  const h = e.target.closest('[data-drag-handle]');
  if (!h || h.dataset.disabled) return;
  const card = h.closest('.q-card'); if (card) card.setAttribute('draggable','true');
});
app.addEventListener('mouseup', () => {
  document.querySelectorAll('.q-card[draggable="true"]').forEach(c=>c.removeAttribute('draggable'));
});
app.addEventListener('dragstart', e => {
  const card = e.target.closest('.q-card');
  if (!card || card.getAttribute('draggable')!=='true') { return; }
  dragId = card.dataset.qid;
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', dragId); } catch(_){}
  requestAnimationFrame(()=>card.classList.add('dragging'));
});
app.addEventListener('dragover', e => {
  if (!dragId) return;
  const card = e.target.closest('.q-card'); if (!card) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  clearDropIndicators();
  if (card.dataset.qid === dragId) return;
  const r = card.getBoundingClientRect();
  card.classList.add((e.clientY - r.top) > r.height/2 ? 'drop-after' : 'drop-before');
});
app.addEventListener('drop', e => {
  if (!dragId) return;
  const card = e.target.closest('.q-card'); if (!card) return;
  e.preventDefault();
  const targetId = card.dataset.qid;
  const r = card.getBoundingClientRect();
  const after = (e.clientY - r.top) > r.height/2;
  const dropped = dragId; dragId = null; clearDropIndicators();
  if (targetId !== dropped) commitReorder(dropped, targetId, after);
});
app.addEventListener('dragend', () => {
  dragId = null; clearDropIndicators();
  document.querySelectorAll('.q-card').forEach(c=>{ c.classList.remove('dragging'); c.removeAttribute('draggable'); });
});

function commitReorder(dropId, targetId, after){
  const areaId = currentAreaId(); if (!areaId) return;
  const area = AREA_BY_ID[areaId];
  const ids = orderedAreaQuestions(area).map(q=>q.id);
  const from = ids.indexOf(dropId); if (from<0) return;
  ids.splice(from,1);
  let ti = ids.indexOf(targetId);
  if (ti<0) ti = ids.length-1;
  ids.splice(after ? ti+1 : ti, 0, dropId);
  if (!store.order) store.order = {};
  store.order[areaId] = ids;
  save();
  renderArea(area);
}

        <div class="text-4xl mb-2">🤖</div>
        <p class="font-display font-bold text-slate-700 dark:text-slate-200">Hi! I'm your Audit Buddy.</p>
        <p class="text-xs text-slate-400 mt-1 mb-3">Ask me anything about audit, Ind AS, standards, or interview answers.</p>
        <div class="flex flex-col gap-1.5">${SUGGEST.map(s=>`<button data-suggest="${chatEsc(s)}" class="text-left text-xs px-3 py-2 rounded-lg bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 hover:border-brand-400 transition">${chatEsc(s)}</button>`).join('')}</div>
      </div>`;
      msgsEl.querySelectorAll('[data-suggest]').forEach(b=>b.addEventListener('click',()=>{ input.value=b.dataset.suggest; send(); }));
      return;
    }
    msgsEl.innerHTML=chat.map(m=>bubble(m.role, m.role==='user'?chatEsc(m.text):fmtBot(m.text))).join('')
      + (busy?`<div class="flex justify-start"><div class="rounded-2xl rounded-bl-sm bg-white dark:bg-white/5 border border-slate-200 dark:border-white/10 px-4 py-3"><span class="inline-flex gap-1"><span class="h-2 w-2 rounded-full bg-slate-400 animate-bounce"></span><span class="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay:.15s"></span><span class="h-2 w-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay:.3s"></span></span></div></div>`:'');
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }
  function save(){ try{ localStorage.setItem(CHAT_KEY, JSON.stringify(chat.slice(-40))); }catch(e){} }

  function send(){
    const text=(input.value||'').trim();
    if(!text||busy) return;
    chat.push({role:'user', text}); input.value=''; input.style.height='auto';
    busy=true; render(); save();
    fetch('/.netlify/functions/chat',{method:'POST',headers:{'content-type':'application/json','x-auth':auth.token},body:JSON.stringify({messages:chat})})
      .then(r=>r.json())
      .then(d=>{ busy=false; chat.push({role:'model', text:(d&&d.reply)||"Sorry, I didn't catch that."}); render(); save(); })
      .catch(()=>{ busy=false; chat.push({role:'model', text:"I couldn't reach the server — check your connection and try again."}); render(); save(); });
  }

  function open(){ panel.classList.remove('hidden'); panel.classList.add('flex'); fab.classList.add('hidden'); render(); setTimeout(()=>input.focus(),50); }
  function close(){ panel.classList.add('hidden'); panel.classList.remove('flex'); fab.classList.remove('hidden'); }
  fab.addEventListener('click',open);
  document.getElementById('chatClose').addEventListener('click',close);
  document.getElementById('chatClear').addEventListener('click',()=>{ chat=[]; save(); render(); });
  sendBtn.addEventListener('click',send);
  input.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } });
  input.addEventListener('input',()=>{ input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,112)+'px'; });
})();

/* ============================================================
   INIT
   ============================================================ */
if(!store.attach) store.attach={};
applyTheme();
renderHeaderControls();
if(SYNC_ON && auth.token){
  // verify the stored session, then load content + personal state
  acct('me').then(m=>{
    if(!m || m.role==='none'){ auth={token:null,role:'none',name:null,email:null,expiresAt:null}; saveAuth(); renderHeaderControls(); router(); return; }
    auth.role=m.role; auth.name=m.name; auth.email=m.email||null; auth.expiresAt=m.expiresAt||null; saveAuth();
    renderHeaderControls(); router(); loadFromCloud();
  }).catch(()=>{ router(); });   // offline → render from local cache
} else {
  router();                      // show login gate (or public buy-access page)
}
// near-live: pull the latest whenever the tab regains focus (logged-in users)
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && authed() && !_syncTimer) loadFromCloud();
});
</script>
</body>
</html>
