<script>
/* ============================================================
   DATA — areas grouped by category. Each question: {id,q,a,ex?,tip?}
   Answers are written first-person & practical (as if experienced).
   ============================================================ */
const CATEGORIES = [
  { id:'concepts', label:'Audit Concepts & Standards', icon:'📋', accent:'brand' },
  { id:'indas',    label:'Ind AS / Technical',         icon:'📘', accent:'cyan' },
  { id:'testing',  label:'Account-Area Testing',       icon:'🧾', accent:'emerald' },
  { id:'law',      label:'Law & Reporting',            icon:'⚖️', accent:'violet' },
  { id:'practical',label:'Practical & Situational',    icon:'🎯', accent:'amber' },
  { id:'you',      label:'Your Experience & Pitch',    icon:'🎤', accent:'rose' },
];

const ACCENTS = {
  brand:  { text:'text-brand-600 dark:text-brand-300',   soft:'bg-brand-500/10',   ring:'ring-brand-400/25',   dot:'bg-brand-500',   grad:'from-brand-400 to-brand-600',   bar:'from-brand-400 to-brand-600' },
  cyan:   { text:'text-cyan-600 dark:text-cyan-300',     soft:'bg-cyan-500/10',    ring:'ring-cyan-400/25',    dot:'bg-cyan-500',    grad:'from-cyan-400 to-cyan-600',     bar:'from-cyan-400 to-cyan-600' },
  emerald:{ text:'text-emerald-600 dark:text-emerald-300',soft:'bg-emerald-500/10',ring:'ring-emerald-400/25', dot:'bg-emerald-500', grad:'from-emerald-400 to-emerald-600',bar:'from-emerald-400 to-emerald-600' },
  violet: { text:'text-violet-600 dark:text-violet-300', soft:'bg-violet-500/10',  ring:'ring-violet-400/25',  dot:'bg-violet-500',  grad:'from-violet-400 to-violet-600', bar:'from-violet-400 to-violet-600' },
  amber:  { text:'text-amber-600 dark:text-amber-300',   soft:'bg-amber-500/10',   ring:'ring-amber-400/25',   dot:'bg-amber-500',   grad:'from-amber-400 to-amber-600',   bar:'from-amber-400 to-amber-600' },
  rose:   { text:'text-rose-600 dark:text-rose-300',     soft:'bg-rose-500/10',    ring:'ring-rose-400/25',    dot:'bg-rose-500',    grad:'from-rose-400 to-rose-600',     bar:'from-rose-400 to-rose-600' },
};

const AREAS = [
  /* ================= CONCEPTS ================= */
  { id:'process', cat:'concepts', icon:'🔄', title:'Audit Process & Cycle', blurb:'End-to-end audit approach, from acceptance to opinion.', questions:[
    { id:'process-1', q:'Explain the audit cycle / process in brief.',
      a:'I think of an audit in four phases. (1) Acceptance & planning — client acceptance, engagement letter, understanding the business, materiality and risk assessment. (2) Risk assessment & controls — walkthroughs of key cycles, evaluating internal controls, deciding whether to rely on controls or go fully substantive. (3) Execution — tests of controls and substantive procedures on each balance and class of transaction. (4) Completion & reporting — subsequent events, going concern, management representations, review of financial statements against Schedule III/CARO, and forming the opinion.',
      ex:'On a manufacturing client in my articleship, planning flagged revenue and inventory as high-risk, so we spent most fieldwork on cut-off testing and the physical stock count, and lighter effort on low-risk areas like share capital.',
      tip:'A panel loves to hear you tie effort to risk — say explicitly "we do more work where risk of misstatement is higher."' },
    { id:'process-2', q:'What is the first step you take when you start the audit of a new client?',
      a:'Understanding the entity and its environment (SA 315) — the business model, industry, key revenue streams, related parties and the accounting system — plus client acceptance/independence checks and reading the prior auditor\'s file where available. Only after understanding the business can I identify where things can go wrong and set a sensible materiality.',
      ex:'For a new trading client I first read the sales structure and found revenue was heavily concentrated in the last month — an immediate cut-off risk that shaped my whole plan.',
      tip:'Don\'t say "start vouching" — that signals no planning mindset.' },
    { id:'process-3', q:'What do you mean by Nature, Timing and Extent of audit procedures?',
      a:'Nature = the type of procedure (inspection, confirmation, recomputation, analytical). Timing = when we do it — at interim or year-end; higher risk pushes work to year-end. Extent = how much — sample size or coverage. As risk of material misstatement rises, we make procedures more robust in nature, shift timing to period-end, and increase the extent.',
      ex:'For a high-risk debtor balance I used external confirmations (nature), sent at year-end (timing), covering ~80% of value (extent) instead of a small interim sample.' },
    { id:'process-4', q:'Difference between Internal Audit and Statutory (External) Audit?',
      a:'Statutory audit is an independent, mandatory audit under the Companies Act giving a true-and-fair opinion to shareholders; scope is set by law and standards. Internal audit is management\'s own function focused on improving controls, risk and operations; scope is set by management/audit committee and it reports internally. Statutory auditors are independent of the company; internal auditors are usually employees or outsourced but still report to management.',
      tip:'Add: "As a statutory auditor I can use internal audit\'s work under SA 610, but I remain solely responsible for my opinion."' },
  ]},
  { id:'materiality', cat:'concepts', icon:'📏', title:'Materiality (SA 320)', blurb:'Overall vs performance materiality, benchmarks, trivial threshold.', questions:[
    { id:'mat-1', q:'What is materiality and why is it relevant in audit?',
      a:'Materiality is the threshold above which a misstatement could reasonably influence the economic decisions of users of the financial statements. It matters because we can\'t check everything — materiality lets us focus effort where an error would actually change a user\'s decision, and it drives sample sizes and what we ultimately report.',
      ex:'A ₹5,000 misclassification in a company with ₹200 crore revenue won\'t change any user\'s decision, so we don\'t chase it; a ₹50 lakh unrecorded liability might.' },
    { id:'mat-2', q:'How is materiality calculated? What considerations go into it?',
      a:'We pick a benchmark relevant to users and apply a percentage. Common rules of thumb: ~5% of profit before tax, ~0.5–1% of revenue or total assets, depending on which is stable and relevant. The choice depends on the business — for a loss-making or volatile company we move away from PBT to revenue or assets. We also consider qualitative factors: covenants, related-party items, statutory limits, and fraud-sensitive areas.',
      ex:'For a company with fluctuating profits I based materiality on ~0.75% of revenue instead of PBT because revenue was the stable, decision-relevant number.',
      tip:'Interviewers push here — be ready to justify WHY you chose that benchmark, not just quote 5%.' },
    { id:'mat-3', q:'Overall vs Performance materiality — and the clearly trivial threshold?',
      a:'Overall materiality is set for the financial statements as a whole. Performance materiality is a lower figure (typically 50–75% of overall) applied to individual balances so that the total of undetected + uncorrected errors stays below overall materiality — it builds in a cushion for aggregation risk. The clearly trivial threshold (often ~5% of overall) is the level below which we don\'t even bother accumulating errors.',
      ex:'If overall materiality is ₹10 lakh, I might set performance materiality at ₹7 lakh for testing and treat anything under ₹50,000 as clearly trivial.' },
    { id:'mat-4', q:'How do you assess materiality during an audit? (practical)',
      a:'Materiality is a threshold for the significance of misstatements. I calculate it as a percentage of a benchmark like revenue, profit or total assets — for a high-revenue business I may set it at around 1% of total revenue — and I also weigh qualitative factors such as the nature of the transaction and its impact on stakeholder decisions. That helps me focus on the areas with the highest risk of material misstatement, and I revise it if my understanding of the business changes during the audit.',
      tip:'Mention you revisit materiality if actual results differ materially from the estimates used at planning.' },
  ]},
  { id:'risk', cat:'concepts', icon:'⚠️', title:'Risk Assessment & RMM (SA 315/330)', blurb:'Audit risk model, RAP, risk of material misstatement, responses.', questions:[
    { id:'risk-1', q:'What is Audit Risk and its components?',
      a:'Audit risk is the risk we give an inappropriate opinion when the financials are materially misstated. Audit Risk = Inherent Risk × Control Risk × Detection Risk. Inherent risk (susceptibility to error before controls) and control risk (that controls miss it) together are the Risk of Material Misstatement — those belong to the client. Detection risk is ours — the risk our procedures miss a misstatement — and it\'s the lever we control by doing more or better work.',
      ex:'For estimates like ECL or provisions inherent risk is high, so I lower detection risk by testing management\'s assumptions in detail rather than just recomputing.' },
    { id:'risk-2', q:'What is a Risk Assessment Procedure (RAP) and what does it include?',
      a:'RAPs are the procedures we perform to understand the entity and identify risks — the foundation of the audit. They include inquiries of management and staff, analytical procedures on draft numbers, observation and inspection (walking the floor, reading minutes and contracts), and the engagement team discussion about where fraud or error could arise.',
      ex:'A simple analytical at planning — gross margin jumping from 20% to 30% with no business reason — is a RAP that flagged a revenue/inventory risk to investigate.' },
    { id:'risk-3', q:'What is the Risk of Material Misstatement, and what do you do when you identify one?',
      a:'RMM is inherent risk combined with control risk at the assertion level. When I identify a significant risk I design a specific response: more persuasive evidence, testing at year-end, larger samples, or involving a senior/specialist. For significant risks I don\'t rely on controls alone — I always perform substantive procedures, and for fraud risks, unpredictable ones.',
      ex:'Where I flagged revenue cut-off as a significant risk, my response was to test invoices and dispatch/GRN dates for the last and first weeks around year-end, both sides of the cut-off.' },
    { id:'risk-4', q:'Difference between Test of Controls and Substantive procedures?',
      a:'Tests of controls check whether a control operated effectively over the period, so we can rely on it and reduce substantive work. Substantive procedures directly detect misstatements in the numbers — tests of details (vouching, confirmations, recomputation) and substantive analytical procedures. If controls aren\'t tested or aren\'t effective, we go fully substantive. Some substantive testing is always required for material balances regardless of controls.',
      tip:'Be ready for the follow-up: "controls failed — do you qualify?" Answer: no, you just increase substantive work.' },
  ]},
  { id:'controls', cat:'concepts', icon:'🛡️', title:'Internal Controls & IFC', blurb:'IFC/IFCR, design vs operating effectiveness, preventive vs detective.', questions:[
    { id:'ctrl-1', q:'Have you done controls testing / IFC in audit? What is it and why is it important?',
      a:'Yes. IFC (Internal Financial Controls) are the policies and procedures a company puts in place to ensure orderly, efficient business, safeguard assets, prevent and detect fraud/error, keep accurate records and prepare reliable financial statements. It matters because reliable numbers depend on reliable processes — and under Section 143(3)(i) the auditor of a company has to report on the adequacy and operating effectiveness of IFC over financial reporting (IFCR).',
      ex:'In O2C, a control that credit limits are checked before a sales order is approved prevents booking revenue to customers who can\'t pay — I tested a sample of orders to confirm the check actually happened.' },
    { id:'ctrl-2', q:'Is there a reporting requirement for IFC in audit?',
      a:'Yes — for companies, the auditor reports on the adequacy and operating effectiveness of Internal Financial Controls over Financial Reporting in a separate annexure (Annexure A) to the audit report under Section 143(3)(i). Note there are exemptions — e.g., certain small/private companies meeting turnover and borrowing conditions are exempt from the IFCR reporting requirement.',
      tip:'Knowing the private-company IFCR exemption (via the MCA notification) signals real exam-level awareness.' },
    { id:'ctrl-3', q:'What is a design deficiency vs an operating effectiveness deficiency? What is Test of Design and Test of Operating Effectiveness?',
      a:'Test of Design (TOD) asks: if this control operates as intended, would it prevent or detect a material misstatement? A design deficiency means the control is missing or wouldn\'t catch the error even if performed. Test of Operating Effectiveness (TOE) asks: did the control actually operate consistently over the period? An operating deficiency means a well-designed control wasn\'t performed properly. We do a walkthrough first to confirm design, then TOE on a sample.',
      ex:'A bank reconciliation reviewed and signed monthly is well-designed; if three of twelve months were unsigned, that\'s an operating (not design) deficiency.' },
    { id:'ctrl-4', q:'What are preventive and detective controls? Give an example.',
      a:'Preventive controls stop an error before it happens; detective controls catch it after. Both are needed — prevention reduces the chance, detection provides a safety net.',
      ex:'Preventive: system blocks a purchase invoice without a matching PO and GRN (three-way match). Detective: the monthly bank reconciliation and a management review of the variance report catch anything that slipped through.' },
    { id:'ctrl-5', q:'Benefits and limitations of internal control?',
      a:'Benefits: reliable financial reporting, safeguarding of assets, fraud/error prevention and detection, operational efficiency and compliance. Limitations (why controls give reasonable, not absolute, assurance): human error, collusion between people, management override of controls, cost-benefit trade-offs, and controls designed for routine — not unusual — transactions.',
      tip:'The word "management override" is gold here — it links straight to SA 240 fraud risk.' },
  ]},
  { id:'fraud', cat:'concepts', icon:'🕵️', title:'Fraud (SA 240)', blurb:'Auditor responsibilities, fraud triangle, management override, ₹2cr scenario.', questions:[
    { id:'fraud-1', q:'What are the auditor\'s responsibilities regarding fraud (SA 240)?',
      a:'We\'re responsible for reasonable assurance that the financials are free from material misstatement whether caused by fraud or error, maintaining professional skepticism throughout. SA 240 sets two presumed fraud risks: revenue recognition and management override of controls. For override we must test journal entries (especially manual/unusual/period-end ones), review estimates for management bias, and evaluate significant unusual transactions.',
      ex:'Testing manual journals posted on the last day of the year to unusual accounts is a standard override procedure I\'d always perform.' },
    { id:'fraud-2', q:'What is the fraud triangle?',
      a:'Three conditions usually present when fraud occurs: Incentive/Pressure (targets, bonuses, debt covenants), Opportunity (weak controls or ability to override), and Rationalisation (the person justifying it to themselves). We use it in the team discussion to brainstorm where and how fraud could happen in this specific client.',
      ex:'A company that must hit a profit covenant (pressure) with a dominant owner-CFO who can override entries (opportunity) is a classic higher-fraud-risk profile.' },
    { id:'fraud-3', q:'You identify a fraud of ₹2 crores. What procedure will you follow?',
      a:'I first gather evidence to understand the nature and extent of the fraud, then assess its impact on the financial statements. I report it promptly to the appropriate level of management and those charged with governance / the audit committee, keeping it confidential, and consider legal and regulatory implications — including the auditor\'s duty to report fraud to the Central Government under Section 143(12) where it crosses the ₹1 crore threshold. I also evaluate which internal controls failed and recommend improvements, and reconsider my risk assessment for the rest of the audit.',
      tip:'The ₹1 crore / Sec 143(12) reporting-to-Government point is exactly what a Big-4 panel is checking for on this question.' },
    { id:'fraud-4', q:'How can you ensure revenue is not fraudulent or has genuinely occurred?',
      a:'I focus on the occurrence and cut-off assertions. I trace a sample of booked revenue back to real evidence — customer PO, dispatch/GRN or proof of delivery, and subsequent receipt in the bank — and test both sides of the year-end cut-off. I scan for red flags: round-sum or last-day sales, sales to related or new parties, unusual credit notes just after year-end (channel stuffing), and revenue booked without dispatch. Analytical review of margins and debtor days corroborates whether the revenue is real.',
      ex:'A spike in sales in the last week reversed by credit notes in April is a classic sign of inflated year-end revenue — I\'d specifically test that pattern.' },
  ]},
  { id:'assertions', cat:'concepts', icon:'✅', title:'Audit Assertions', blurb:'Transaction, balance and presentation assertions and the procedures.', questions:[
    { id:'assert-1', q:'What are audit assertions? How are they classified?',
      a:'Assertions are the implicit claims management makes in the financial statements, which we test. They fall in three groups. Transactions (P&L): Occurrence, Completeness, Accuracy, Cut-off, Classification. Balances (Balance sheet): Existence, Rights & Obligations, Completeness, Valuation. Presentation & disclosure: Occurrence & rights, Completeness, Classification & understandability, Accuracy & valuation. Every procedure I design targets a specific assertion.',
      ex:'For debtors, "existence" (is this receivable real?) is tested by confirmation, while "valuation" (is it collectible?) is tested via the ECL/ageing and subsequent receipts.' },
    { id:'assert-2', q:'Explain balance sheet assertions with how you test each.',
      a:'Existence — the asset/liability is real: confirm cash/loans with banks, confirm debtors, physically verify inventory/PPE. Rights & Obligations — the entity owns it or owes it: check title deeds, invoices, loan agreements. Completeness — nothing is omitted: search for unrecorded liabilities (post-year-end payments), reconcile subledgers. Valuation — carried at the right amount: ECL on debtors, NRV on inventory, depreciation and impairment on PPE.',
      tip:'Pair each assertion with a procedure out loud — that\'s what separates a strong candidate from a textbook one.' },
    { id:'assert-3', q:'For revenue, which assertions do you focus on and what procedures do you perform?',
      a:'Occurrence and cut-off are the priority (fraud risk of overstatement), then completeness, accuracy and classification. Procedures: vouch sales to PO + dispatch + invoice + receipt (occurrence); test invoices either side of year-end against dispatch dates (cut-off); trace dispatch records forward to invoices (completeness); recompute price × quantity and check the rate to the approved price list (accuracy); and substantive analytical review of margins and revenue trends.',
      ex:'I check the last few GRNs/dispatch notes of March and first few of April to confirm sales landed in the correct year.' },
  ]},
  { id:'sampling', cat:'concepts', icon:'🎲', title:'Sampling', blurb:'Methods, how to choose a sample, and dealing with errors found.', questions:[
    { id:'samp-1', q:'What is sampling? How do you choose samples? What methods?',
      a:'Sampling means testing less than 100% of a population and projecting the result. Methods are statistical — random, systematic (every nth item), and monetary-unit/PPS sampling which weights selection toward higher-value items — and non-statistical — haphazard or judgmental (e.g., all items above performance materiality plus a sample of the rest). I choose based on risk: higher risk and more variability mean a bigger sample; a strong control environment allows a smaller one.',
      ex:'For debtors I\'d confirm all balances above performance materiality individually (targeted) and take a random sample from the remaining smaller balances.' },
    { id:'samp-2', q:'You find an error in your sample — what do you do?',
      a:'First I understand its nature and cause. I project the error to the whole population and compare against performance materiality. I\'m cautious about calling it an isolated "anomaly" — that needs strong justification. I add it to the summary of misstatements, and if projected error is significant I extend testing and reassess whether audit risk is still acceptable.',
      tip:'Never say "I\'d just ignore one small error" — always project and accumulate.' },
  ]},
  { id:'analytical', cat:'concepts', icon:'📈', title:'Analytical Procedures', blurb:'Ratio & flux analysis, building an expectation, when used.', questions:[
    { id:'anly-1', q:'What are analytical procedures and when are they used?',
      a:'They\'re evaluations of financial data by studying plausible relationships — ratios, trends and comparisons. Used at three points: at planning (risk assessment) to spot unusual movements, as substantive analytical procedures during fieldwork where a relationship is predictable, and mandatorily at completion to check the financials make overall sense with what we know.',
      ex:'Expected interest expense = average borrowings × rate; if actual is far off, I investigate rather than vouching every entry.' },
    { id:'anly-2', q:'What is flux (variance) analysis?',
      a:'Flux analysis compares current figures against prior period, budget or expectation and investigates variances beyond a set threshold (in both ₹ and %). The key is corroborating management\'s explanation with independent evidence rather than accepting it at face value.',
      ex:'Repairs expense up 60% year-on-year — management says a plant overhaul; I\'d tie that to the invoices and check nothing capital was wrongly expensed.' },
  ]},
  { id:'documentation', cat:'concepts', icon:'🗂️', title:'Documentation & Management Reps', blurb:'SA 230 working papers and SA 580 representation letter.', questions:[
    { id:'doc-1', q:'What is the standard for audit documentation (SA 230)?',
      a:'Documentation should let an experienced auditor with no prior connection understand the nature, timing and extent of procedures, the results and evidence, and the significant judgments made. Each working paper should show who prepared and reviewed it and when. The final file is assembled within 60 days of the audit report and retained (typically 7+ years).',
      tip:'"If it isn\'t documented, it wasn\'t done" — say that line; reviewers love it.' },
    { id:'doc-2', q:'Why do you obtain a Management Representation Letter (SA 580)?',
      a:'Written representations are audit evidence that management acknowledges its responsibility for the financial statements and has given us complete information. They complement — never substitute for — other evidence. The letter is dated as near as practicable to, but not after, the audit report date. If management refuses to provide required representations, it can lead to a disclaimer of opinion.',
      ex:'For contingent liabilities and related-party completeness, where external evidence is limited, the MRL is important corroboration alongside board minutes.' },
  ]},

  /* ================= IND AS ================= */
  { id:'revenue', cat:'indas', icon:'💰', title:'Revenue — Ind AS 115', blurb:'5-step model, over-time vs point-in-time, and testing revenue.', questions:[
    { id:'rev-1', q:'Walk me through the 5-step revenue recognition model (Ind AS 115).',
      a:'1) Identify the contract with the customer. 2) Identify the distinct performance obligations (POBs). 3) Determine the transaction price (including variable consideration, financing, non-cash). 4) Allocate the price to each POB on relative stand-alone selling price. 5) Recognise revenue when/as each POB is satisfied — i.e., when control transfers, either over time or at a point in time.',
      ex:'A mobile plan bundling a handset + 12 months of service is two POBs: handset revenue at delivery (point in time) and service revenue spread over the year (over time).' },
    { id:'rev-2', q:'Point-in-time vs over-time — the three conditions for over time?',
      a:'Recognise over time if any one of three is met: (a) the customer simultaneously receives and consumes the benefits as you perform (e.g., cleaning services); (b) you create or enhance an asset the customer controls as it\'s built; (c) the asset has no alternative use to you AND you have an enforceable right to payment for work done to date. If none apply, recognise at the point in time control transfers.',
      ex:'A construction contract on the customer\'s land usually meets (b)/(c) → over time; a standard product sold off the shelf → point in time on delivery.' },
    { id:'rev-3', q:'How would you audit revenue and what about cut-off journal entries?',
      a:'Revenue is a presumed fraud risk, so I test occurrence and cut-off hard: vouch sales to PO + dispatch + invoice + receipt, and check invoices/dispatch either side of year-end. For cut-off, goods dispatched before year-end but invoiced after should still be revenue this year (accrue), and goods invoiced before but dispatched after should be reversed/deferred.',
      ex:'Basic cut-off entry — goods delivered 30 Mar, invoiced 2 Apr: Dr Unbilled receivable / Cr Revenue in March; reverse when the invoice is raised in April.' },
    { id:'rev-4', q:'How do you ensure revenue actually occurred and isn\'t inflated?',
      a:'Trace booked revenue to third-party evidence (dispatch/POD, customer confirmation, bank receipt), test the year-end cut-off both ways, and analytically review margins and debtor-days for unexplained spikes. Watch for channel stuffing — big last-week sales reversed by post-year-end credit notes — and revenue to related or brand-new parties.',
      tip:'Mention scanning April credit notes against March sales — it shows real fieldwork instinct.' },
    { id:'rev-5', q:'What are distinct performance obligations and variable consideration?',
      a:'A promise is a distinct POB if the customer can benefit from it on its own (or with readily available resources) and it\'s separately identifiable from other promises. Variable consideration (discounts, rebates, penalties, bonuses, rights of return) is estimated using expected value or most-likely-amount, then constrained — included only to the extent it\'s highly probable there won\'t be a significant revenue reversal.',
      ex:'A volume rebate a customer will likely earn is estimated and netted off revenue now, not when it\'s finally paid.' },
  ]},
  { id:'leases', cat:'indas', icon:'🏢', title:'Leases — Ind AS 116', blurb:'Right-of-use asset, lease liability, exemptions, lessee model.', questions:[
    { id:'lease-1', q:'How does a lessee account for a lease under Ind AS 116?',
      a:'Ind AS 116 puts almost all leases on the balance sheet under a single lessee model. At commencement, recognise a lease liability at the present value of future lease payments (discounted at the rate implicit in the lease, or the incremental borrowing rate), and a right-of-use (ROU) asset = liability + initial direct costs + prepayments + dismantling estimate − incentives. Then unwind interest on the liability (finance cost) and depreciate the ROU asset, usually straight-line over the shorter of lease term and useful life.',
      ex:'A 5-year office lease of ₹10 lakh/year: you record the PV of those payments as both a liability and an ROU asset, then split each rent payment into interest and principal, and depreciate the asset over 5 years.' },
    { id:'lease-2', q:'What are the recognition exemptions, and is the finance/operating split still there?',
      a:'Two exemptions for lessees: short-term leases (≤12 months, no purchase option) and low-value asset leases (e.g., laptops, small items). For these you just expense the rent straight-line — no ROU/liability. And importantly, the finance-vs-operating lease distinction is gone for lessees under Ind AS 116 (they\'re all on-balance-sheet); it only survives for lessors.',
      tip:'That "operating vs finance is gone for lessees but stays for lessors" point is a favourite trap — nail it.' },
    { id:'lease-3', q:'How would you audit the ROU asset and the discount rate?',
      a:'Get the lease register and test completeness against the rent ledger and contracts, recompute the PV of payments, and challenge the discount rate (benchmark the IBR to the entity\'s borrowing cost and tenor). I check the lease term includes renewal/termination options that are reasonably certain to be exercised, and test the depreciation and interest unwind for the year.',
      ex:'If a 3-year lease has two 3-year renewals the tenant is reasonably certain to take, the lease term for measurement is 9 years, not 3 — a common error I\'d look for.' },
  ]},
  { id:'fininst', cat:'indas', icon:'🏦', title:'Financial Instruments & ECL — Ind AS 109', blurb:'Financial instruments, classification, and the Expected Credit Loss model.', questions:[
    { id:'fin-1', q:'What do you mean by financial instruments, and basic accounting under Ind AS 109?',
      a:'A financial instrument is any contract giving rise to a financial asset of one party and a financial liability or equity of another — e.g., cash, receivables, loans, investments, payables, borrowings. Basic accounting involves initial recognition at fair value, then measurement at amortised cost or fair value; for items like loans we record interest on an effective-interest basis and unwind/amortise any discount over time.',
      ex:'An interest-free security deposit is recorded at present value on day one; the difference unwinds as notional interest income over the deposit period.' },
    { id:'fin-2', q:'Explain the Expected Credit Loss (ECL) model.',
      a:'ECL is a forward-looking impairment model — you provide for expected losses, not just incurred ones. Three stages: Stage 1 books 12-month ECL for performing assets; Stage 2 books lifetime ECL when credit risk increases significantly; Stage 3 books lifetime ECL for credit-impaired assets. ECL = PD × LGD × EAD with forward-looking factors. For trade receivables, companies typically use the simplified provision-matrix (lifetime ECL) approach.',
      ex:'A provision matrix might charge 1% on current debtors, 5% on 31–90 days, 20% on 91–180, and 100% on 1-year-plus — that\'s ECL applied practically.' },
    { id:'fin-3', q:'How are financial assets classified?',
      a:'By the business model plus the SPPI test (are cash flows solely payments of principal and interest?). Amortised cost = hold-to-collect and SPPI passes (e.g., normal receivables, loans). FVOCI = hold-to-collect-and-sell and SPPI passes. FVTPL = everything else — trading assets, equity investments, or where SPPI fails (e.g., derivatives).',
      tip:'Ind AS 32 = presentation (liability vs equity), 109 = recognition/measurement, 107 = disclosures — a clean way to show you know the family.' },
  ]},
  { id:'ppe', cat:'indas', icon:'🏭', title:'PPE & Depreciation — Ind AS 16 / Sch II', blurb:'Useful lives, depreciation, componentisation, CARO fixed-asset points.', questions:[
    { id:'ppe-1', q:'What audit procedures do you perform for PPE and depreciation?',
      a:'Existence: physically verify a sample and agree to the fixed-asset register. Rights: check invoices/title deeds. Completeness: reconcile the FAR to the GL and check capex approvals. Valuation: recompute depreciation, confirm useful lives are reasonable (Schedule II is the reference for companies), check componentisation of large assets, and consider impairment indicators (Ind AS 36). I also review additions for revenue-vs-capital classification and disposals for correct gain/loss and de-recognition.',
      ex:'A big "repairs" charge that\'s really a machine replacement should be capitalised — I\'d catch that in additions/repairs scrutiny.' },
    { id:'ppe-2', q:'How is depreciation determined and what does Schedule II say?',
      a:'Depreciation allocates an asset\'s depreciable amount (cost − residual value) over its useful life. For companies, Schedule II of the Companies Act prescribes indicative useful lives; a company can use a different life but must justify it by technical assessment and disclose it. Significant components with different lives are depreciated separately (componentisation). Methods are typically SLM or WDV, applied consistently.',
      ex:'Plant with useful life 15 years per Schedule II, cost ₹15 lakh, residual 5% → roughly ₹95,000 depreciation a year on SLM.' },
  ]},
  { id:'inventory', cat:'indas', icon:'📦', title:'Inventory — Ind AS 2', blurb:'Cost vs NRV, valuation, physical verification and its audit.', questions:[
    { id:'inv-1', q:'How is inventory valued under Ind AS 2?',
      a:'At the lower of cost and net realisable value. Cost includes purchase cost, conversion costs and costs to bring inventory to its present location and condition, but excludes abnormal waste, storage (unless part of production) and selling costs. NRV = estimated selling price − costs to complete − costs to sell. Cost formulas: FIFO or weighted average; LIFO is not allowed.',
      ex:'If finished goods cost ₹100 but can only be sold for ₹90 net, they\'re written down to ₹90 — the ₹10 hits the P&L.' },
    { id:'inv-2', q:'What audit procedures do you perform on inventory?',
      a:'Attend the physical count (existence and condition), test counts both ways (floor-to-sheet and sheet-to-floor), and check cut-off of goods received/dispatched around the count date. For valuation, test costing (purchase invoices, overhead absorption) and NRV (compare to post-year-end selling prices), and review slow-moving/obsolete stock for provisioning. Reconcile the count to the stock records and the GL.',
      tip:'This links directly to the classic scenario — "what if you can\'t attend the count?" (see the Practical section).' },
  ]},

  /* ================= TESTING ================= */
  { id:'receivables', cat:'testing', icon:'🧮', title:'Trade Receivables', blurb:'Existence, valuation, ageing, ECL/provisioning, confirmations.', questions:[
    { id:'recv-1', q:'How do you audit trade receivables?',
      a:'Existence — send external confirmations (positive) for a value-weighted sample; for non-replies use alternative procedures (subsequent receipts, invoices, dispatch). Valuation/recoverability — review the ageing, test the ECL/provision matrix, and check subsequent collections. Completeness and cut-off — tie to revenue testing. Also scan for long-outstanding, related-party and credit-balance debtors.',
      ex:'A debtor overdue 8 months with no receipt after year-end is a red flag for provisioning even if management is optimistic.' },
    { id:'recv-2', q:'How do you test the provision for doubtful debts / ECL on receivables?',
      a:'I test the ageing accuracy first (a wrong ageing makes the whole provision wrong), then evaluate the ECL rates in the provision matrix against historical loss experience and current conditions, and corroborate with post-year-end receipts. I specifically challenge large or related-party balances that are fully outstanding but not provided.',
      ex:'If historically 15% of 90+ day debtors go bad but management provides only 5%, I\'d push back with the historical data.' },
  ]},
  { id:'cashbank', cat:'testing', icon:'🏧', title:'Cash & Bank', blurb:'Existence, bank confirmations, reconciliations, and fudging risks.', questions:[
    { id:'cash-1', q:'What procedures do you perform for cash and bank balances?',
      a:'Bank: obtain independent bank confirmations for all accounts, agree balances to the ledger, and review the bank reconciliation — investigating old un-cleared cheques and any post-year-end reversals. Cash: attend or do a surprise cash count and agree to the cash book; for material balances test the reasonableness of cash held. I also check for unusual round-sum transfers near year-end (window dressing).',
      ex:'A large cheque "issued" on 31 March but clearing only in May can be window-dressing to show lower creditors — I\'d probe the reco.' },
    { id:'cash-2', q:'How do you ensure bank balances actually exist and are not fudged?',
      a:'The strongest evidence is the direct bank confirmation received by us, not a statement handed over by the client (which can be doctored). I match the confirmation to the ledger and the reconciliation, examine reconciling items for validity, and look at the bank statement for the period after year-end to see the reconciling cheques actually clear.',
      tip:'Emphasise "confirmation received directly by the auditor" — that\'s the control against a forged statement.' },
  ]},
  { id:'payroll', cat:'testing', icon:'👥', title:'Payroll', blurb:'Existence of employees, accuracy, statutory dues, and controls.', questions:[
    { id:'pay-1', q:'How do you audit payroll?',
      a:'I walk through the hire-to-pay cycle and test key controls (approval of new joiners, master-data changes, and payroll sign-off). Substantively: reconcile headcount, recompute a sample of salaries from appointment letters/attendance, check statutory deductions (PF, ESI, TDS) are computed and deposited on time, and do an analytical — average cost per employee and month-on-month movement — to spot ghost employees or unusual spikes.',
      ex:'A month where payroll jumps but headcount is flat could mean bonuses — or ghost employees; the analytical flags it and I\'d vouch the difference.' },
    { id:'pay-2', q:'How would you detect a "ghost employee" fraud?',
      a:'Look for employees with no attendance but full pay, duplicate bank accounts or PAN across employees, salaries paid in cash, and staff who never take leave. I\'d match the payroll master to HR records and, for a sample, tie back to appointment letters and actual bank credits.',
      tip:'This shows fraud-alert thinking on a routine area — panels like that.' },
  ]},
  { id:'confirmations', cat:'testing', icon:'📨', title:'External Confirmations', blurb:'Debtors/creditors/bank confirmations and alternate procedures.', questions:[
    { id:'conf-1', q:'What alternate procedures do you perform when confirmations are not received (debtors, creditors, bank)?',
      a:'For debtors: check subsequent receipts after year-end, and vouch to invoices and dispatch/POD. For creditors: check subsequent payments, and vouch to supplier invoices and GRNs; also do a search for unrecorded liabilities. For bank: a non-reply is more serious — I\'d follow up directly with the bank, use the online statement obtained independently, and escalate, because bank confirmation is core evidence. After receiving any confirmation, I reconcile differences (goods/cash in transit, disputes) and investigate anything unexplained.',
      ex:'A debtor who doesn\'t confirm but whose full balance is received in April is effectively validated by that subsequent receipt.' },
    { id:'conf-2', q:'How do you handle balance confirmation mismatches during an audit?',
      a:'I reconcile the client\'s ledger to the third-party confirmation, review supporting documents like invoices and payment receipts to find errors or omissions, and communicate with both parties to understand the discrepancy. Common causes are timing differences — goods or cash in transit — or disputed amounts. I document the reconciliation, escalate unresolved items to management, and include any material unresolved discrepancy in the audit findings with necessary disclosures.',
      ex:'Client shows a debtor ₹10 lakh, customer confirms ₹8 lakh — usually ₹2 lakh of goods/cash in transit that I tie out to dispatch or the next month\'s receipt.' },
  ]},

  /* ================= LAW & REPORTING ================= */
  { id:'caro', cat:'law', icon:'📜', title:'CARO 2020', blurb:'Clauses, 2020 vs 2016 changes, applicability, fixed-asset clause.', questions:[
    { id:'caro-1', q:'What is CARO? Key differences between CARO 2020 and 2016?',
      a:'CARO (Companies Auditor\'s Report Order) requires the auditor to report on specific matters in an annexure to the audit report. CARO 2020 is much more detailed than 2016 — it added clauses on disclosure of proceedings for benami property, whether the company was declared a wilful defaulter, diversion/utilisation of term loans, unrecorded income surrendered in tax assessments, related-party compliance under Sec 177/188, internal audit systems, and reporting on any resignation of statutory auditors and material uncertainty on meeting liabilities.',
      ex:'The wilful-defaulter and benami-property clauses are new in 2020 — good concrete "2-3 differences" to quote.' },
    { id:'caro-2', q:'Is CARO applicable to consolidated financial statements?',
      a:'No — CARO 2020 does not apply to the auditor\'s report on consolidated financial statements, except for one clause requiring the auditor to report qualifications/adverse remarks in the CARO reports of the companies included in the consolidation. CARO applies to standalone statements of companies (with exemptions for banking companies, insurance companies, Section 8 companies, OPCs and certain small companies).',
      tip:'The "CARO doesn\'t apply to CFS except the one consolidation clause" answer is exactly what this trick question wants.' },
    { id:'caro-3', q:'What is the fixed-asset (PPE) clause in CARO 2020?',
      a:'Clause 3(i) covers PPE and intangibles: whether the company maintains proper records showing full particulars including quantitative details and location; whether PPE is physically verified at reasonable intervals and material discrepancies dealt with; whether title deeds of immovable property are held in the company\'s name; whether any revaluation was done by a registered valuer; and whether any benami property proceedings are pending.',
      ex:'Title deeds not in the company\'s name is a specific reportable item I\'d check by inspecting the deeds against the register.' },
  ]},
  { id:'schedule3', cat:'law', icon:'📑', title:'Schedule III', blurb:'Presentation format and the recent key amendments.', questions:[
    { id:'sch3-1', q:'What are the key recent Schedule III amendments?',
      a:'Schedule III sets the format of the financial statements. Recent amendments added disclosures such as: ageing schedules for trade receivables, trade payables, CWIP and intangibles under development; rounding-off is now mandatory based on turnover; disclosure of promoter shareholding and changes during the year; ratios with explanations for variances over 25%; details of benami property, wilful defaulter status, relationships with struck-off companies, loans to promoters/KMPs, and use of borrowed funds/CSR spend.',
      ex:'The debtor/creditor ageing buckets and the 25%-variance ratio explanations are the ones I\'d expect to prepare and check in practice.' },
  ]},
  { id:'report', cat:'law', icon:'📝', title:'Audit Report & Opinions', blurb:'Types of opinions and when each is issued.', questions:[
    { id:'rep-1', q:'What are the types of audit reports/opinions and when do you issue each?',
      a:'Unmodified (clean) — financials give a true and fair view. Then three modified opinions driven by two factors — whether the issue is material and whether it\'s pervasive. Qualified — a material but not pervasive misstatement, or inability to obtain evidence on a specific area ("except for…"). Adverse — a material and pervasive misstatement; the financials do not give a true and fair view. Disclaimer — unable to obtain sufficient evidence and the possible effect is material and pervasive, so we don\'t express an opinion.',
      ex:'Can\'t attend the stock count and inventory is material but only one area → qualified; can\'t audit most of the records → disclaimer.' },
    { id:'rep-2', q:'What is the impact on your audit if controls are not operating as intended — do you qualify directly?',
      a:'No, not directly. If controls aren\'t effective, control risk is high, so I respond by increasing substantive procedures — larger samples, year-end testing, more detailed vouching — to get comfort on the numbers themselves. I only modify the opinion if, after that extended substantive work, I still find a material misstatement or can\'t get sufficient evidence. Control weaknesses are also communicated to management and those charged with governance, and reported under IFCR.',
      tip:'This is a classic trap — the wrong answer is "yes, I qualify." The right instinct is "do more substantive work first."' },
  ]},
  { id:'limitedreview', cat:'law', icon:'🔎', title:'Limited Review', blurb:'How a limited review differs from a statutory audit.', questions:[
    { id:'lr-1', q:'What are the basic differences between a Limited Review and a Statutory Audit?',
      a:'A limited review (SRE 2410, used for listed companies\' quarterly results) gives limited (negative) assurance — "nothing has come to our attention" — and relies mainly on inquiry and analytical procedures. A statutory audit gives reasonable (positive) assurance — "true and fair view" — and involves detailed substantive testing, controls work and external confirmations. A review is quicker and less extensive; the audit is deeper and higher assurance.',
      ex:'Quarterly results get a limited review; the annual financials get a full statutory audit.' },
  ]},

  /* ================= PRACTICAL ================= */
  { id:'situations', cat:'practical', icon:'🎭', title:'Situation-Based Scenarios', blurb:'Real curveballs panels throw to test practical thinking.', questions:[
    { id:'sit-1', q:'What will you do if it\'s not possible to attend the physical verification of stock?',
      a:'If physical verification isn\'t possible, I rely on detailed inventory records and cross-verify them with purchase and sales invoices. Analytical procedures like inventory turnover and gross-margin comparisons help assess the reasonableness of stock levels. Where stock is held in third-party warehouses I obtain independent confirmations, and if feasible I do a count on a later date and roll back to year-end. These steps let me form a reasonable opinion on existence and valuation; if I still can\'t get sufficient evidence and inventory is material, I\'d consider a qualified opinion.',
      ex:'Count on 15 April, then work back to 31 March using April purchases and sales — a roll-back that\'s widely accepted.' },
    { id:'sit-2', q:'What if the rate as per the Purchase Order (PO) and the Invoice do not match?',
      a:'I compare the rates in the PO and the invoice, then review whether there\'s a supplementary agreement, amended PO or approval that justifies the change. If no such document exists, I escalate to management for clarification. I document all findings and highlight material discrepancies in the audit report — because a rate mismatch can indicate a control gap in the three-way match or even a kickback/fraud risk.',
      ex:'PO says ₹100/unit, invoice ₹115 with no amendment — I\'d flag the P2P control weakness and check if it\'s a one-off or systemic.' },
    { id:'sit-3', q:'How do you deal with balance confirmation mismatches during an audit?',
      a:'I reconcile the client\'s ledger with the third-party confirmation, examine supporting documents like invoices and receipts to spot errors or omissions, and if it stays unresolved I communicate with both parties for more information. I document the findings, escalate unresolved issues to management, and include any material discrepancy in the audit report with the necessary disclosures. Most mismatches turn out to be goods-in-transit or cash-in-transit timing differences.',
      ex:'A ₹2 lakh gap that\'s a cheque in transit clears in the first week of April — I tie it to the bank statement and it\'s resolved.' },
    { id:'sit-4', q:'Management refuses to provide information you need. What do you do?',
      a:'First I understand why and try to resolve it professionally, escalating within management and then to those charged with governance/the audit committee. I document the request and refusal. If I still can\'t obtain sufficient appropriate evidence, it\'s a scope limitation — leading to a qualified opinion or, if the area is material and pervasive, a disclaimer. Independence means I don\'t simply accept "trust us."',
      tip:'Show you escalate through governance before jumping to a modified opinion — that\'s the mature answer.' },
  ]},
  { id:'excel', cat:'practical', icon:'📊', title:'Excel & Tools in Audit', blurb:'How you actually use Excel and audit software day-to-day.', questions:[
    { id:'xl-1', q:'How do tools like VLOOKUP and Pivot Tables help in audits?',
      a:'VLOOKUP (and XLOOKUP) let me match data across sheets — for example tying the fixed-asset register to the depreciation working, or matching the debtor ledger to receipts — which quickly surfaces discrepancies in large datasets. Pivot Tables let me summarise and analyse — revenue by month or customer, expense trends, ageing buckets — so I can spot outliers fast. They save time and improve accuracy, which makes them invaluable for sampling, reconciliations and analytical procedures.',
      ex:'A pivot of sales by month instantly shows a March spike; a VLOOKUP of March sales against April credit notes tests whether it reversed.' },
    { id:'xl-2', q:'Which audit / accounting software have you worked on?',
      a:'I\'ve worked hands-on in Zoho Books for accounting and reporting, and I\'m very comfortable in Excel for audit workings, reconciliations and analytics. On statutory audits I worked within the firm\'s documentation approach — linking risks to assertions to procedures and maintaining review trails. Big-4 GDCs use platforms like EY Canvas, KPMG Clara, PwC Aura and Deloitte Omnia; the methodology is similar, so I\'m confident I can pick up any of them quickly.',
      tip:'Frame tool gaps as "the methodology is the same, the software is just the interface" — confidence without overclaiming.' },
  ]},

  /* ================= YOU ================= */
  { id:'articleship', cat:'you', icon:'🎓', title:'Articleship Experience', blurb:'Speak confidently about your audit work at Pawan Ram Kumar & Co.', questions:[
    { id:'art-1', q:'Tell me about your articleship and the audit exposure you had.',
      a:'I did my articleship at Pawan Ram Kumar & Co. in Rewari, a well-established firm known for statutory audits, tax and GST. On the audit side I assisted on statutory and tax audits — ensuring compliance with Schedule III, CARO 2020 and IFC requirements. I conducted walkthroughs of key cycles (Order-to-Cash, Procure-to-Pay and Payroll), evaluated internal controls and designed tests of controls and substantive procedures, applied analytical and ratio/variance analysis to spot unusual trends, and contributed to finalisation of accounts and audit deliverables. I also led a small team of four on some assignments, handling delegation and review.',
      ex:'On a manufacturing client I owned the P2P walkthrough — testing the three-way match of PO, GRN and invoice — and the revenue cut-off testing at year-end.',
      tip:'Anchor every claim to a cycle (O2C/P2P/Payroll) and an assertion — it makes limited experience sound structured and real.' },

/* Build lookups */
const AREA_BY_ID = Object.fromEntries(AREAS.map(a => [a.id, a]));
const CAT_BY_ID  = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));
function areaAccent(area){ return ACCENTS[CAT_BY_ID[area.cat].accent]; }

/* ============================================================
   STATE (localStorage)
   ============================================================ */
const KEY = 'himanshi_audit_v2';
let store = load();
function load(){
  try {
    const raw = JSON.parse(localStorage.getItem(KEY)) || {};
    return { q: raw.q || {}, custom: raw.custom || {}, order: raw.order || {}, attach: raw.attach || {}, trash: raw.trash || [], theme: raw.theme || 'dark' };
  } catch { return { q:{}, custom:{}, order:{}, attach:{}, trash:[], theme:'dark' }; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(store)); scheduleSync(); }
function qs(id){ return store.q[id] || (store.q[id] = {}); }

/* All questions incl. custom, for a given area */
function areaQuestions(area){
  const custom = (store.custom[area.id] || []).map(c => ({...c, _custom:true}));
  return [...area.questions, ...custom];
}
/* Apply the user's saved drag order (unknown/new ids keep default order, appended) */
function orderedAreaQuestions(area){
  const list = areaQuestions(area);
  const ord = store.order && store.order[area.id];
  if (!ord || !ord.length) return list;
  const map = Object.fromEntries(list.map(q => [q.id, q]));
  const result = ord.filter(id => map[id]).map(id => map[id]);
  const seen = new Set(ord);
  list.forEach(q => { if (!seen.has(q.id)) result.push(q); });
  return result;
}
function allQuestions(){
  let list = [];
  AREAS.forEach(a => areaQuestions(a).forEach(q => list.push({area:a, q})));
  return list;
}
function getText(q, field){ // field 'q' or 'a'
  const st = store.q[q.id] || {};
  if (field === 'q') return st.qOverride != null ? st.qOverride : q.q;
  if (field === 'a') return st.aOverride != null ? st.aOverride : q.a;
}

/* Metrics */
function metrics(list){
  let total=0, done=0, flag=0;
  list.forEach(({q}) => { total++; const s = store.q[q.id]||{}; if(s.done) done++; if(s.flag) flag++; });
  return { total, done, flag, todo: total-done, pct: total? Math.round(done/total*100):0 };
}

const ACCOUNT_URL='/.netlify/functions/account';
const CONTENT_URL='/.netlify/functions/content';
const PSTATE_URL='/.netlify/functions/pstate';
const FILES_URL='/.netlify/functions/files';
const PORTAL_URL='/.netlify/functions/portal';
const AUTH_KEY='mb4_auth';
const SYNC_ON = location.protocol==='http:' || location.protocol==='https:';

/* ---- auth state (access code = member; passphrase = admin) ---- */
let auth={ token:null, role:'none', name:null, email:null, expiresAt:null };
try{ const a=JSON.parse(localStorage.getItem(AUTH_KEY)); if(a&&a.token) auth=a; }catch(e){}
function saveAuth(){ localStorage.setItem(AUTH_KEY, JSON.stringify(auth)); }
function isAdmin(){ return auth.role==='admin'; }
function authed(){ return auth.role==='admin'||auth.role==='member'; }
function acct(action, extra){ return fetch(ACCOUNT_URL,{method:'POST',headers:Object.assign({'content-type':'application/json'}, auth.token?{'x-auth':auth.token}:{}),body:JSON.stringify(Object.assign({action},extra||{}))}).then(r=>r.json()); }
function logout(){ auth={token:null,role:'none',name:null,email:null,expiresAt:null}; localStorage.removeItem(AUTH_KEY); store.q={};store.custom={};store.order={};store.attach={};store.trash=[]; portalCache=null; adminPortalRecords=[]; if(avatarObjectUrl){URL.revokeObjectURL(avatarObjectUrl);avatarObjectUrl=null;} if(headerAvatarObjectUrl){URL.revokeObjectURL(headerAvatarObjectUrl);headerAvatarObjectUrl=null;} _lastContent=null;_lastPstate=null; location.hash='#/'; renderHeaderControls(); renderGate(); }

/* ---- sync status pill ---- */
function setSyncStatus(state){
  const el=document.getElementById('syncStatus'); if(!el) return;
  const map={ saved:['Synced','text-emerald-500'], syncing:['Syncing…','text-amber-500'], offline:['Offline','text-rose-500'], local:['Local','text-slate-400'] };
  const [txt,cls]=map[state]||map.local;
  el.textContent=txt; el.className='hidden sm:inline '+cls;
  const dot=document.getElementById('syncDot'); if(dot) dot.className='h-2 w-2 rounded-full '+cls.replace('text-','bg-');
}

/* ---- content (admin-owned) + personal state (per-user) split ---- */
function buildContent(){
  const q={};
  for(const id in store.q){ const v=store.q[id]||{}; const c={}; if(v.qOverride!=null)c.qOverride=v.qOverride; if(v.aOverride!=null)c.aOverride=v.aOverride; if(Array.isArray(v.examples))c.examples=v.examples; if(Object.keys(c).length)q[id]=c; }
  return { q, custom:store.custom||{}, order:store.order||{}, attach:store.attach||{}, trash:store.trash||[] };
}
function buildPstate(){
  const q={};
  for(const id in store.q){ const v=store.q[id]||{}; const p={}; if(v.flag)p.flag=true; if(v.done)p.done=true; if(v.note)p.note=v.note; if(Object.keys(p).length)q[id]=p; }
  return { q };
}
function scheduleSync(){ if(!SYNC_ON||!authed()) return; clearTimeout(_syncTimer); _syncTimer=setTimeout(pushNow,1000); }
function pushNow(){
  if(!SYNC_ON||!authed()) return Promise.resolve();
  const cp=JSON.stringify(buildContent()), pp=JSON.stringify(buildPstate());
  const jobs=[];
  if(isAdmin() && cp!==_lastContent){ _lastContent=cp; jobs.push(fetch(CONTENT_URL,{method:'POST',headers:{'content-type':'application/json','x-auth':auth.token},body:JSON.stringify({content:JSON.parse(cp)})}).then(r=>{ if(!r.ok) throw 0; })); }
  if(pp!==_lastPstate){ _lastPstate=pp; jobs.push(fetch(PSTATE_URL,{method:'POST',headers:{'content-type':'application/json','x-auth':auth.token},body:JSON.stringify({pstate:JSON.parse(pp)})}).then(r=>{ if(!r.ok) throw 0; })); }
  if(!jobs.length) return Promise.resolve();
  setSyncStatus('syncing');
  return Promise.all(jobs).then(()=>setSyncStatus('saved')).catch(()=>{ _lastContent=null; _lastPstate=null; setSyncStatus('offline'); });
}
function applyCloud(content, ps){
  content=content||{q:{},custom:{},order:{},attach:{},trash:[]};
  ps=ps||{};
  store.q={};
  for(const id in (content.q||{})) store.q[id]=Object.assign({}, content.q[id]);
  for(const id in ps){ store.q[id]=Object.assign(store.q[id]||{}, ps[id]); }
  store.custom=content.custom||{}; store.order=content.order||{}; store.attach=content.attach||{}; store.trash=content.trash||[];
  _lastContent=JSON.stringify(buildContent()); _lastPstate=JSON.stringify(buildPstate());
  localStorage.setItem(KEY, JSON.stringify(store));
}
function loadFromCloud(){
  if(!SYNC_ON||!authed()) return Promise.resolve();
  setSyncStatus('syncing');
  return Promise.all([
    fetch(CONTENT_URL,{headers:{'x-auth':auth.token}}).then(r=>r.json()).catch(()=>null),
    fetch(PSTATE_URL,{headers:{'x-auth':auth.token}}).then(r=>r.json()).catch(()=>null)
  ]).then(([c,p])=>{
    applyCloud(c&&c.content, p&&p.pstate&&p.pstate.q);
    setSyncStatus('saved'); refresh();
  }).catch(()=>setSyncStatus('offline'));
}

/* ---- attachment file ops (cloud) ---- */
function fileViewUrl(id,dl){ return FILES_URL+'?auth='+encodeURIComponent(auth.token||'')+'&id='+encodeURIComponent(id)+(dl?'&dl=1':''); }
function attListFor(slot){ return (store.attach&&store.attach[slot])||[]; }
function attachTo(slot,qid,file){
  const id='att-'+Date.now()+'-'+Math.round(Math.random()*1e9);
  const type=file.type||'application/octet-stream';
  return fetch(FILES_URL,{method:'POST',headers:{'x-auth':auth.token,'x-att-id':id,'x-file-name':encodeURIComponent(file.name),'x-file-type':type},body:file})
    .then(r=>{ if(!r.ok) throw new Error('upload failed'); return r.json(); })
    .then(()=>{ if(!store.attach) store.attach={}; (store.attach[slot]||(store.attach[slot]=[])).push({id,name:file.name,type,size:file.size}); save(); });
}
function removeAttach(id,slot){
  // SOFT delete: keep the cloud blob, move metadata to Trash so it can be retrieved
  const arr=(store.attach&&store.attach[slot])||[];
  const it=arr.find(a=>a.id===id);
  if(it){ if(!store.trash) store.trash=[]; store.trash.push({id:it.id,name:it.name,type:it.type,size:it.size,slot,deletedAt:Date.now()}); }
  if(store.attach&&store.attach[slot]) store.attach[slot]=store.attach[slot].filter(a=>a.id!==id);
  save();
  return Promise.resolve();
}
function restoreTrash(id){
  const t=(store.trash||[]).find(x=>x.id===id); if(!t) return;
  if(!store.attach) store.attach={};
  if(!(store.attach[t.slot]||[]).some(a=>a.id===t.id)) (store.attach[t.slot]||(store.attach[t.slot]=[])).push({id:t.id,name:t.name,type:t.type,size:t.size});
  store.trash=store.trash.filter(x=>x.id!==id);
  save();
}
function purgeTrash(id){
  const u=FILES_URL+'?id='+encodeURIComponent(id);
  return fetch(u,{method:'DELETE',headers:{'x-auth':auth.token}}).catch(()=>{}).then(()=>{ store.trash=(store.trash||[]).filter(x=>x.id!==id); save(); });
}

function fileIcon(t){ t=t||''; if(t.includes('pdf'))return '📄'; if(t.startsWith('image/'))return '🖼️'; if(t.includes('word')||t.includes('document'))return '📝'; if(t.includes('sheet')||t.includes('excel')||t.includes('csv'))return '📊'; return '📎'; }
function humanSize(n){ if(n<1024)return n+' B'; if(n<1048576)return Math.round(n/1024)+' KB'; return (n/1048576).toFixed(1)+' MB'; }

/* Compact attach zone for a slot */

    </button>`:''}
  </div>`;
}

/* Full-screen live viewer — streams the file live from the cloud */
function openAttachment(id,type,name){
  const t=type||''; const url=fileViewUrl(id); const durl=fileViewUrl(id,true);
  let viewer;
  if(t.includes('pdf')) viewer=`<iframe src="${url}" class="flex-1 w-full bg-white" title="${esc(name)}"></iframe>`;
  else if(t.startsWith('image/')) viewer=`<div class="flex-1 grid place-items-center overflow-auto p-4"><img src="${url}" class="max-w-full max-h-full rounded-lg shadow-2xl" alt="${esc(name)}"></div>`;
  else viewer=`<div class="flex-1 grid place-items-center text-white text-center p-6"><div><p class="text-5xl mb-3">📎</p><p class="mb-3 text-sm opacity-80">No inline preview for this file type.</p><a href="${durl}" class="underline text-sm">Download ${esc(name)}</a></div></div>`;
  const wrap=document.createElement('div');
  wrap.className='fixed inset-0 z-[60] flex flex-col bg-black/80 backdrop-blur-sm';
  wrap.innerHTML=`<div class="flex items-center justify-between gap-3 px-4 py-3 bg-slate-900 text-white shrink-0">
      <span class="text-sm font-semibold truncate">${fileIcon(t)} ${esc(name)}</span>
      <div class="flex items-center gap-2 shrink-0">
        <a href="${url}" target="_blank" rel="noopener" class="text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 transition">Open in new tab</a>
        <a href="${durl}" class="text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 transition">Download</a>
        <button data-close-viewer class="text-xs px-3 py-1.5 rounded-lg bg-white/10 hover:bg-white/20 transition">✕ Close</button>
      </div>
    </div>${viewer}`;
  document.body.appendChild(wrap);
  const close=()=>{ wrap.remove(); document.removeEventListener('keydown',onKey); };
  const onKey=e=>{ if(e.key==='Escape') close(); };
  wrap.querySelector('[data-close-viewer]').onclick=close;
  wrap.addEventListener('click',e=>{ if(e.target===wrap) close(); });
  document.addEventListener('keydown',onKey);
}

/* replace the underlying file of an existing attachment (keeps its id & slot) */
function replaceAttach(id,slot,file){
  // upload the new file under a NEW id and keep the old blob (moved to Trash) so it's retrievable
  const newId='att-'+Date.now()+'-'+Math.round(Math.random()*1e9);
  const type=file.type||'application/octet-stream';
  return fetch(FILES_URL,{method:'POST',headers:{'x-auth':auth.token,'x-att-id':newId,'x-file-name':encodeURIComponent(file.name),'x-file-type':type},body:file})
    .then(r=>{ if(!r.ok) throw new Error('replace failed'); return r.json(); })
    .then(()=>{ const arr=(store.attach&&store.attach[slot])||[]; const it=arr.find(a=>a.id===id);
      if(it){ if(!store.trash) store.trash=[]; store.trash.push({id:it.id,name:it.name,type:it.type,size:it.size,slot,deletedAt:Date.now(),replaced:true}); it.id=newId; it.name=file.name; it.type=type; it.size=file.size; }
      save(); });
}

function questionInfo(qid){
  for(const a of AREAS){ const q=a.questions.find(x=>x.id===qid); if(q){ const ov=store.q[qid]&&store.q[qid].qOverride; return {areaId:a.id, areaTitle:a.title, areaIcon:a.icon, cat:a.cat, qTitle: ov||q.q}; } }
  for(const areaId in (store.custom||{})){ const c=(store.custom[areaId]||[]).find(x=>x.id===qid); if(c){ const a=AREA_BY_ID[areaId]; return {areaId, areaTitle:a?a.title:areaId, areaIcon:a?a.icon:'📄', cat:a?a.cat:'', qTitle:c.q||qid}; } }
  return {areaId:null, areaTitle:'(unknown)', areaIcon:'❓', cat:'', qTitle:qid};
}
function allAttachments(){
  const out=[], at=store.attach||{};
  for(const slot in at){
    const idx=slot.indexOf('::'); const qid=idx>=0?slot.slice(0,idx):slot; const part=idx>=0?slot.slice(idx+2):'';
    const info=questionInfo(qid);
    const partLabel = part==='q'?'Question' : part==='a'?'Answer' : part.startsWith('e:')?'Example' : part;
    (at[slot]||[]).forEach(f=> out.push(Object.assign({}, f, {slot, qid, part, partLabel}, info)) );
  }
  return out;
}

/* ---- minimal ZIP (store method) for bulk download / backup ---- */
function _crc32(u8){
  if(!_crc32.t){ const t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } _crc32.t=t; }
  const t=_crc32.t; let crc=0xFFFFFFFF;
  for(let i=0;i<u8.length;i++) crc=t[(crc^u8[i])&0xFF]^(crc>>>8);
  return (crc^0xFFFFFFFF)>>>0;
}
const _u16=n=>[n&0xFF,(n>>>8)&0xFF];
const _u32=n=>[n&0xFF,(n>>>8)&0xFF,(n>>>16)&0xFF,(n>>>24)&0xFF];
function makeZip(files){ // files: [{name, data:Uint8Array}]
  const enc=new TextEncoder(); const chunks=[]; const central=[]; let offset=0;
  const push=arr=>{ const u=arr instanceof Uint8Array?arr:new Uint8Array(arr); chunks.push(u); offset+=u.length; };
  for(const f of files){
    const nameBytes=enc.encode(f.name); const crc=_crc32(f.data); const size=f.data.length; const localOffset=offset;
    push([].concat(_u32(0x04034b50),_u16(20),_u16(0x0800),_u16(0),_u16(0),_u16(0),_u32(crc),_u32(size),_u32(size),_u16(nameBytes.length),_u16(0)));
    push(nameBytes); push(f.data);
    central.push({nameBytes,crc,size,localOffset});
  }
  const cdStart=offset;
  for(const c of central){
    push([].concat(_u32(0x02014b50),_u16(20),_u16(20),_u16(0x0800),_u16(0),_u16(0),_u16(0),_u32(c.crc),_u32(c.size),_u32(c.size),_u16(c.nameBytes.length),_u16(0),_u16(0),_u16(0),_u16(0),_u32(0),_u32(c.localOffset)));
    push(c.nameBytes);
  }
  push([].concat(_u32(0x06054b50),_u16(0),_u16(0),_u16(central.length),_u16(central.length),_u32(offset-cdStart),_u32(cdStart),_u16(0)));
  return new Blob(chunks,{type:'application/zip'});
}
function downloadBlob(blob,name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),8000); }

/* ---- Text-to-speech: listen to Q&A (prefers an Indian male English voice) ---- */
let _voices=[], speakingId=null, _ttsKeep=null;
function _loadVoices(){ try{ _voices=window.speechSynthesis.getVoices()||[]; }catch(e){ _voices=[]; } }
if('speechSynthesis' in window){ _loadVoices(); try{ window.speechSynthesis.onvoiceschanged=_loadVoices; }catch(e){} }
function pickVoice(){
  if(!_voices.length) _loadVoices();
  const v=_voices; if(!v.length) return null;
  const f=fn=>v.find(fn);
  return f(x=>/en[-_]IN/i.test(x.lang)&&/male|ravi|prabhat|hemant|madhur/i.test(x.name))
    || f(x=>/ravi|prabhat|hemant/i.test(x.name))
    || f(x=>/en[-_]IN/i.test(x.lang))
    || f(x=>/india/i.test(x.name))
    || f(x=>/^en/i.test(x.lang)&&/male/i.test(x.name))
    || f(x=>/^en[-_](gb|us|au)/i.test(x.lang))
    || f(x=>/^en/i.test(x.lang))
    || v[0];
}
function stopSpeech(){ try{ window.speechSynthesis.cancel(); }catch(e){} speakingId=null; if(_ttsKeep){clearInterval(_ttsKeep);_ttsKeep=null;} updateSpeakButtons(); }
function speakText(id, text){
  if(!('speechSynthesis' in window)){ alert('Sorry, this browser does not support reading text aloud.'); return; }
  const synth=window.speechSynthesis;
  if(speakingId===id){ stopSpeech(); return; }   // toggle off
  synth.cancel();
  const voice=pickVoice();
  const sentences=(text.replace(/\s+/g,' ').match(/[^.!?]+[.!?]+|\S[^.!?]*$/g)||[text]);
  const chunks=[]; let buf='';
  sentences.forEach(c=>{ if((buf+' '+c).length>210){ if(buf) chunks.push(buf.trim()); buf=c; } else buf=buf?buf+' '+c:c; });
  if(buf.trim()) chunks.push(buf.trim());
  speakingId=id;
  chunks.forEach((c,i)=>{ const u=new SpeechSynthesisUtterance(c); if(voice){ u.voice=voice; u.lang=voice.lang; } u.rate=0.97; u.pitch=1;
    if(i===chunks.length-1) u.onend=()=>{ if(speakingId===id) stopSpeech(); };
    u.onerror=()=>{}; synth.speak(u);
  });
  if(_ttsKeep) clearInterval(_ttsKeep);
  _ttsKeep=setInterval(()=>{ if(!synth.speaking){ clearInterval(_ttsKeep); _ttsKeep=null; return; } try{ synth.resume(); }catch(e){} }, 9000);
  updateSpeakButtons();
}
function updateSpeakButtons(){
  document.querySelectorAll('[data-action="speak"]').forEach(b=>{ const on=b.dataset.id===speakingId; b.classList.toggle('text-rose-500',on); b.classList.toggle('bg-rose-500/10',on); b.title=on?'Stop':'Listen'; });
}
function speakQA(id){
  const base=findBaseQ(id); if(!base) return;
  const exs=getExamples(base); const ex=exs[0]?exs[0].text:'';
  const text=getText(base,'q')+'. Answer. '+getText(base,'a')+(ex?('. For example. '+ex):'');
  speakText(id, text);
}

  document.body.appendChild(wrap);

  return wrap;
}
function updateBulkModal(m,done,total,cur){ if(!m) return; const bar=m.querySelector('#bulkBar'); if(bar) bar.style.width=Math.round(done/total*100)+'%'; const c=m.querySelector('#bulkCount'); if(c) c.textContent=done+' / '+total; const cc=m.querySelector('#bulkCur'); if(cc&&cur!=null) cc.textContent=cur||''; }
async function bulkDraftArea(areaId){
  const area=AREA_BY_ID[areaId]; if(!area) return;
  const targets=orderedAreaQuestions(area).filter(q=>!isEdited(q.id));
  if(!targets.length){ alert('Every question in this area already has an edited/AI answer. Nothing to draft.'); return; }
  if(!confirm('Draft '+targets.length+' answer(s) in "'+area.title+'" with AI?\n\nEach is saved automatically — you can edit, refine or undo any afterwards.')) return;
  bulkCancel=false;
  const modal=showBulkModal(area.title, targets.length);
  let done=0, ok=0, failed=0, stopped='';
  for(const q of targets){
    if(bulkCancel){ stopped=' (cancelled)'; break; }
    updateBulkModal(modal, done, targets.length, getText(q,'q').slice(0,70));
    try{
      const d=await fetch('/.netlify/functions/chat',{method:'POST',headers:{'content-type':'application/json','x-auth':auth.token},body:JSON.stringify({task:'draft',question:getText(q,'q'),answer:getText(q,'a')})}).then(r=>r.json());
      if(d && d.error && /daily limit/i.test(d.error)){ stopped=' — daily AI limit reached'; break; }
      if(d && d.answer){ const s=qs(q.id); s.aOverride=d.answer; if(d.example) s.examples=[{id:q.id+'-ex'+Date.now(),label:'💡 Example',text:d.example}]; save(); ok++; }
      else failed++;
    }catch(e){ failed++; }
    done++;
    updateBulkModal(modal, done, targets.length, '');
  }
  try{ await pushNow(); }catch(e){}
  if(modal) modal.remove();
  refresh();
  alert('Drafted '+ok+' answer(s)'+(failed?(', '+failed+' failed'):'')+stopped+'.');
}
function uniqueName(name,seen){ if(seen[name]==null){ seen[name]=0; return name; } seen[name]++; const d=name.lastIndexOf('.'); return d>0? name.slice(0,d)+' ('+seen[name]+')'+name.slice(d) : name+' ('+seen[name]+')'; }

async function zipAttachments(list, prefix){
  const seen={}, files=[];
  for(const f of list){
    const buf=new Uint8Array(await fetch(fileViewUrl(f.id,true)).then(r=>r.arrayBuffer()));
    files.push({name:(prefix||'')+uniqueName(f.name,seen), data:buf});
  }
  return files;
}

function relTime(ts){ if(!ts) return ''; const s=Math.max(0,Math.round((Date.now()-ts)/1000)); if(s<60)return s+'s ago'; const m=Math.round(s/60); if(m<60)return m+'m ago'; const h=Math.round(m/60); if(h<24)return h+'h ago'; return Math.round(h/24)+'d ago'; }
function absTime(ts){ try{ return new Date(ts).toLocaleString(); }catch(e){ return ''; } }
function statLabel(s){ if(!s) return ''; const p=[]; if(s.edits)p.push(s.edits+' edited'); if(s.flags)p.push(s.flags+' flagged'); if(s.done)p.push(s.done+' done'); if(s.notes)p.push(s.notes+' noted'); p.push((s.files||0)+' file'+((s.files===1)?'':'s')); if(s.trash)p.push(s.trash+' trashed'); return p.join(' · '); }

function restoreVersion(ts){
  if(!confirm('Restore your tracker to this version?\n\nYour current state is saved as a new version first, so you can undo this restore too.')) return;
  setSyncStatus('syncing');
  fetch('/.netlify/functions/history?code='+encodeURIComponent(syncCode)+'&ts='+encodeURIComponent(ts)).then(r=>r.json()).then(snap=>{
    if(!snap||!snap.data){ alert('Could not load that version.'); setSyncStatus('offline'); return; }
    adopt(snap.data); _lastPayload=null;
    pushNow().then(()=>{ setSyncStatus('saved'); location.hash='#/'; refresh(); alert('Restored to '+absTime(ts)+' ✓'); });

(function(){
  const fi=document.getElementById('fileInput');
  fi.addEventListener('change',()=>{
    const files=[...fi.files]; if(!files.length){ return; }
    setSyncStatus('syncing');
    if(fileMode==='replace'){
      const targets=replaceTargets.slice(); replaceTargets=[]; fileMode='attach';
      const n=Math.min(files.length, targets.length);
      Promise.all(targets.slice(0,n).map((t,i)=>replaceAttach(t.id,t.slot,files[i])))
        .then(()=>{ fi.value=''; fi.multiple=true; refresh(); pushNow(); })
        .catch(()=>{ alert('Replace failed. Check your connection and try again.'); fi.value=''; fi.multiple=true; refresh(); });

      .then(()=>{ fi.value=''; refresh(); pushNow(); })
      .catch(()=>{ alert('Sorry, uploading the attachment failed. Check your connection and try again.'); fi.value=''; refresh(); });
  });

function portalRequest(action, options={}){
  const method=options.method||'GET';
  const headers=Object.assign({}, auth.token?{'x-auth':auth.token}:{}, options.headers||{});
  const url=PORTAL_URL+'?action='+encodeURIComponent(action)+(options.query||'');
  return fetch(url,{method,headers,body:options.body}).then(async r=>{
    const data=await r.json().catch(()=>({error:'Unexpected server response.'}));
    if(!r.ok) throw new Error(data.error||'Request failed.');
    return data;
  });
}
function loadPortalRecord(){

function setHeaderAvatarFallback(profile){
  const text=document.getElementById('headerAvatarText'), img=document.getElementById('headerAvatarImg');
  if(!text||!img) return;
  img.classList.add('hidden'); img.src='';
  const chosen=profile&&AVATAR_CHOICES.includes(profile.avatarChoice)?profile.avatarChoice:'';
  text.textContent=authed()?(chosen||initials((profile&&profile.fullName)||auth.name)):'MB4';
  text.className=chosen?'text-2xl leading-none':'';
}
function refreshHeaderAvatar(){
  const text=document.getElementById('headerAvatarText'), img=document.getElementById('headerAvatarImg');
  if(!text||!img) return;
  const requestId=++headerAvatarRequest;
  if(!authed()){
    if(headerAvatarObjectUrl){URL.revokeObjectURL(headerAvatarObjectUrl);headerAvatarObjectUrl=null;}
    setHeaderAvatarFallback(null); return;
  }
  const token=auth.token;
  fetch(PORTAL_URL+'?action=avatar&v='+Date.now(),{headers:{'x-auth':token},cache:'no-store'}).then(r=>{
    if(!r.ok) throw new Error('no avatar');
    return r.blob();
  }).then(blob=>{
    if(auth.token!==token||requestId!==headerAvatarRequest) return;
    if(headerAvatarObjectUrl) URL.revokeObjectURL(headerAvatarObjectUrl);
    headerAvatarObjectUrl=URL.createObjectURL(blob);
    img.src=headerAvatarObjectUrl; img.classList.remove('hidden'); text.textContent='';
  }).catch(()=>{
    if(auth.token!==token||requestId!==headerAvatarRequest) return;
    const cached=portalCache&&portalCache.profile;
    if(cached){ setHeaderAvatarFallback(cached); return; }
    portalRequest('me').then(d=>{ if(auth.token===token&&requestId===headerAvatarRequest) setHeaderAvatarFallback(d.profile||{}); }).catch(()=>{ if(requestId===headerAvatarRequest) setHeaderAvatarFallback({fullName:auth.name}); });
  });
}

  }).then(blob=>{
    if(avatarObjectUrl) URL.revokeObjectURL(avatarObjectUrl);

function exportCandidateData(){
  const headers=['Name','Email','Mobile','City','State','PIN','CA status','CA attempt','Qualification year','Experience','Current employer','Target role','Preferred firms','Preferred locations','Marketing consent','Readiness %','Questions completed','Flagged questions','Last progress sync','Interview company','Interview role','Interview date','Round','Status','Follow-up date','Employer email','Confidence','Questions asked','Feedback','Next step'];
  const rows=[];
  adminPortalRecords.forEach(record=>{
    const p=record.profile||{}, interviews=(record.interviews&&record.interviews.length)?record.interviews:[{}];
    const progress=candidateProgress(record);
    interviews.forEach(item=>rows.push([
      p.fullName,p.email,p.mobile,p.city,p.state,p.pinCode,p.caStatus,p.caAttempt,p.qualificationYear,
      p.experienceYears,p.currentEmployer,p.targetRole,p.preferredFirms,p.preferredLocations,
      p.marketingConsent?'Yes':'No',progress.pct,progress.done,progress.flagged,progress.updatedAt||'',
      item.company,item.role,item.interviewDate,item.round,
      statusLabel(item.status||''),item.followUpDate,item.employerEmail,item.confidenceRating,
      item.questionsAsked,item.feedback,item.nextStep
    ]));
  });
  const cell=value=>`"${String(value==null?'':value).replace(/"/g,'""')}"`;
  const csv=[headers,...rows].map(row=>row.map(cell).join(',')).join('\r\n');
  downloadBlob(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),'mission-big4-candidate-data-'+new Date().toISOString().slice(0,10)+'.csv');
}
function candidateProgress(record){
  const state=(record&&record.progress&&record.progress.q)||{};
  const questions=allQuestions();
  const validIds=new Set(questions.map(item=>item.q.id));
  let done=0, flagged=0, notes=0;
  for(const [id,value] of Object.entries(state)){
    if(!validIds.has(id)) continue;
    if(value.done) done++;
    if(value.flag) flagged++;
    if(value.hasNote) notes++;
  }
  const total=questions.length;
  const areas=AREAS.map(area=>{
    const ids=areaQuestions(area).map(q=>q.id);
    const areaDone=ids.filter(id=>state[id]&&state[id].done).length;
    return {id:area.id,title:area.title,icon:area.icon,done:areaDone,total:ids.length,pct:ids.length?Math.round(areaDone*100/ids.length):0};
  });
  return {done,total,flagged,notes,pct:total?Math.round(done*100/total):0,updatedAt:record&&record.progress&&record.progress.updatedAt,areas};
}
function fmtLastActive(iso){
  if(!iso) return 'No recent sync recorded';
  const time=Date.parse(iso); if(!time) return 'No recent sync recorded';
  const mins=Math.max(0,Math.round((Date.now()-time)/60000));
  if(mins<2) return 'Just now';
  if(mins<60) return mins+' min ago';
  const hours=Math.round(mins/60); if(hours<24) return hours+' hr ago';
  const days=Math.round(hours/24); if(days<7) return days+' day'+(days===1?'':'s')+' ago';
  return fmtExpiry(iso);
}
